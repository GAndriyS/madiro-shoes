services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: madiro
      POSTGRES_PASSWORD: madiro
      POSTGRES_DB: madiro
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U madiro -d madiro']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
