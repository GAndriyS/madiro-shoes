name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: madiro
          POSTGRES_PASSWORD: madiro
          POSTGRES_DB: madiro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U madiro -d madiro"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://madiro:madiro@localhost:5432/madiro?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-0123456789-0123456789
      JWT_REFRESH_SECRET: ci-refresh-secret-0123456789-0123456789

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @madiro/api prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Apply migrations
        run: pnpm --filter @madiro/api db:deploy

      # Fail if schema.prisma drifted from the committed migrations
      # (someone edited the schema without generating a migration).
      - name: Check migration drift
        run: pnpm --filter @madiro/api db:drift

      - name: API integration tests
        run: pnpm --filter @madiro/api test:e2e
